<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 1em; color: #333; }

.btn-group { display: inline-flex; }
.btn-group .btn {
    padding: 0.5em 1em;
    border: 1px solid #ccc;
    background: #f5f5f5;
    cursor: pointer;
    font-size: inherit;
    color: #333;
    transition: background 0.15s;
}
.btn-group .btn:first-child { border-radius: 4px 0 0 4px; }
.btn-group .btn:last-child { border-radius: 0 4px 4px 0; }
.btn-group .btn + .btn { border-left: none; }
.btn-group .btn:hover { background: #e0e0e0; }
.btn-group .btn.active { background: #d0d0d0; border-color: #aaa; font-weight: bold; }
.btn-group .btn input { display: none; }

#status {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #888;
    margin-right: 0.5em;
    vertical-align: middle;
    transition: background 0.3s;
}
#status.ok { background: #4a4; }
#status.err { background: #c33; }

#power { display: inline-block; margin-top: 0.5em; }

ul { margin: 1em 0; padding-left: 1.5em; }
li { margin: 0.3em 0; }
code { background: #eee; padding: 0.1em 0.3em; border-radius: 3px; }
</style>

<script>
"use strict";

var innenTemp = 21.0;
var statusEl = document.getElementById("status");
var statusText = document.getElementById("statusText");
var failCount = 0;

function setStatus(ok) {
    if (ok) {
        failCount = 0;
        statusEl.className = "ok";
        statusText.textContent = "";
    } else {
        failCount++;
        statusEl.className = "err";
        statusText.textContent = "connection error" + (failCount > 1 ? " (" + failCount + ")" : "");
    }
}

function getJSON(url, cb) {
    fetch(url).then(function(r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
    }).then(function(json) {
        setStatus(true);
        cb(json);
    }).catch(function() {
        setStatus(false);
    });
}

function postJSON(url, data) {
    fetch(url, { method: "POST", body: "" + data }).catch(function() {
        setStatus(false);
    });
}

function $(id) { return document.getElementById(id); }

function update_vals() {
    getJSON("/event/Solarkollektortemperatur", function(json) {
        var value = json.value;
        var percentValue = Math.round((value / 120) * 100) + "%";
        var bar = document.querySelector(".progress-bar");
        if (bar) bar.style.height = percentValue;
        $("tempSolar").textContent = value.toFixed(1) + json.unit;
    });
    getJSON("/event/TiefpassTemperaturwert_ATS", function(json) {
        $("tempAussen").textContent = json.value.toFixed(1) + json.unit;
    });
    getJSON("/event/BedienRTSolltemperaturA1M1", function(json) {
        innenTemp = json.value.toFixed(1);
        $("tempInnen").textContent = innenTemp + json.unit;
    });
    getJSON("/event/nvoPWRState_CFDM_state", function(json) {
        $("tempInnen").style.fill = (json.value == 1) ? "#ff0000" : "#000000";
    });
    getJSON("/event/nvoPWRState_CFDM_value", function(json) {
        $("power").textContent = json.value.toFixed(1) + json.unit;
    });
    getJSON("/event/BedienteilBA_GWGA1", function(json) {
        var val = json.value;
        var btns = document.querySelectorAll("#BedienteilBA_GWGA1 .btn");
        btns.forEach(function(btn) {
            var input = btn.querySelector("input");
            if (input.value == val) {
                btn.classList.add("active");
                input.checked = true;
            } else {
                btn.classList.remove("active");
                input.checked = false;
            }
        });
    });
}

update_vals();
setInterval(update_vals, 10000);

$("plusButton").addEventListener("click", function() {
    innenTemp = parseFloat(innenTemp) + 1;
    $("tempInnen").textContent = innenTemp.toFixed(1) + "\u00b0C";
    postJSON("/event/BedienRTSolltemperaturA1M1", innenTemp);
    update_vals();
});

$("minusButton").addEventListener("click", function() {
    innenTemp = parseFloat(innenTemp) - 1;
    $("tempInnen").textContent = innenTemp.toFixed(1) + "\u00b0C";
    postJSON("/event/BedienRTSolltemperaturA1M1", innenTemp);
    update_vals();
});

document.querySelectorAll("#BedienteilBA_GWGA1 .btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
        var input = btn.querySelector("input");
        input.checked = true;
        document.querySelectorAll("#BedienteilBA_GWGA1 .btn").forEach(function(b) {
            b.classList.remove("active");
        });
        btn.classList.add("active");
        postJSON("/event/BedienteilBA_GWGA1", input.value);
    });
});
</script>
